<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Hide Game</title><style>
body{
margin:0;
background:#111;
overflow:hidden;
}

canvas{
display:block;
background:#222;
}

#joystick{
position:fixed;
bottom:40px;
left:40px;
width:120px;
height:120px;
background:rgba(255,255,255,0.1);
border-radius:50%;
}

#stick{
position:absolute;
width:60px;
height:60px;
background:rgba(255,255,255,0.4);
border-radius:50%;
left:30px;
top:30px;
}
</style></head><body><canvas id="game"></canvas>

<div id="joystick">
<div id="stick"></div>
</div><script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {
x:200,
y:200,
size:30
};

let enemy = {
x:500,
y:300,
size:30
};

let moveX = 0;
let moveY = 0;

const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");

let dragging = false;

joystick.addEventListener("touchstart",()=>{
dragging = true;
});

document.addEventListener("touchend",()=>{
dragging = false;
moveX = 0;
moveY = 0;
stick.style.left = "30px";
stick.style.top = "30px";
});

document.addEventListener("touchmove",(e)=>{

if(!dragging) return;

let rect = joystick.getBoundingClientRect();

let x = e.touches[0].clientX - rect.left - 60;
let y = e.touches[0].clientY - rect.top - 60;

let dist = Math.sqrt(x*x + y*y);
let max = 40;

if(dist > max){
x = x / dist * max;
y = y / dist * max;
}

stick.style.left = x + 30 + "px";
stick.style.top = y + 30 + "px";

moveX = x / max;
moveY = y / max;

});

function update(){

player.x += moveX * 5;
player.y += moveY * 5;

let dx = enemy.x - player.x;
let dy = enemy.y - player.y;

let dist = Math.sqrt(dx*dx + dy*dy);

if(dist < 40){
alert("تم العثور عليك!");
player.x = 200;
player.y = 200;
}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "lime";
ctx.fillRect(player.x,player.y,player.size,player.size);

ctx.fillStyle = "red";
ctx.fillRect(enemy.x,enemy.y,enemy.size,enemy.size);

}

function loop(){

update();
draw();

requestAnimationFrame(loop);

}

loop();

</script></body>
</html>
