<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الثعابين والسلالم</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Tajawal', sans-serif;
      background: #b71c1c;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
    }
    #game-container {
      display: flex;
      flex-direction: row;
      gap: 10px;
      background: #b71c1c;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      max-width: 1200px;
      width: fit-content;
    }
    /* اللوحة */
    #board-wrapper {
      position: relative;
      flex-shrink: 0;
    }
    #board-canvas, #token-canvas {
      display: block;
      border: 4px solid #FFD700;
      border-radius: 4px;
    }
    #token-canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
    /* لوحة المعلومات */
    #panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 200px;
      color: white;
    }
    .card {
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid rgba(255,215,0,0.5);
      border-radius: 12px;
      padding: 12px;
    }
    .card h3 {
      color: #FFD700;
      font-size: 1.1rem;
      border-bottom: 1px solid rgba(255,215,0,0.3);
      padding-bottom: 5px;
      margin-bottom: 8px;
      text-align: center;
    }
    /* قائمة اللاعبين */
    .player-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 6px;
      margin-bottom: 5px;
      border: 2px solid transparent;
    }
    .player-item.active {
      border-color: #FFD700;
      background: rgba(255,215,0,0.15);
    }
    .player-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid white;
    }
    .player-info {
      flex: 1;
    }
    .player-name {
      font-weight: 700;
      font-size: 0.85rem;
    }
    .player-pos {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.7);
    }
    .turn-badge {
      background: #FFD700;
      color: #000;
      font-size: 0.6rem;
      font-weight: 900;
      padding: 2px 6px;
      border-radius: 10px;
      display: none;
    }
    .player-item.active .turn-badge {
      display: block;
    }
    /* النرد */
    .dice-area {
      text-align: center;
    }
    .dice-box {
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 12px;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 10px rgba(0,0,0,0.5);
      transition: transform 0.1s;
    }
    .dice-box.rolling {
      animation: roll 0.3s ease;
    }
    @keyframes roll {
      0% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(90deg) scale(1.1); }
      50% { transform: rotate(180deg) scale(1); }
      75% { transform: rotate(270deg) scale(1.1); }
      100% { transform: rotate(360deg) scale(1); }
    }
    #dice-canvas {
      width: 60px;
      height: 60px;
    }
    #roll-btn {
      background: linear-gradient(135deg, #FFD700, #FF8C00);
      border: none;
      border-radius: 30px;
      padding: 10px 0;
      width: 100%;
      font-weight: 900;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 8px;
      transition: 0.2s;
    }
    #roll-btn:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: 0 0 15px #FFD700;
    }
    #roll-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #reset-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 20px;
      padding: 8px;
      width: 100%;
      cursor: pointer;
      font-weight: 700;
    }
    #reset-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    #message {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 8px;
      font-size: 0.9rem;
      text-align: center;
      margin-top: 8px;
    }
    #message.snake { background: rgba(200,30,30,0.5); border-color: #FF5252; }
    #message.ladder { background: rgba(30,150,30,0.5); border-color: #66BB6A; }
    #message.win { background: rgba(255,215,0,0.3); border-color: #FFD700; color: #FFD700; }
    /* نافذة الفوز */
    #win-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .win-box {
      background: linear-gradient(135deg, #1a0022, #0a1040);
      border: 3px solid #FFD700;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      color: white;
      animation: pop 0.5s;
    }
    @keyframes pop {
      0% { transform: scale(0); }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .win-box .trophy { font-size: 4rem; }
    .win-box h2 { color: #FFD700; font-size: 2rem; margin: 10px 0; }
    .win-box button {
      background: linear-gradient(135deg, #FFD700, #FF8C00);
      border: none;
      border-radius: 30px;
      padding: 10px 30px;
      font-weight: 900;
      font-size: 1.2rem;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <!-- الجهة اليسرى: لوحة اللعبة -->
    <div id="board-wrapper">
      <canvas id="board-canvas" width="500" height="500"></canvas>
      <canvas id="token-canvas" width="500" height="500"></canvas>
    </div>

    <!-- الجهة اليمنى: معلومات اللاعبين والنرد -->
    <div id="panel">
      <div class="card">
        <h3>🎮 اللاعبون</h3>
        <div id="players-list"></div>
      </div>

      <div class="card dice-area">
        <h3>🎲 النرد</h3>
        <div class="dice-box" id="dice-box">
          <canvas id="dice-canvas" width="60" height="60"></canvas>
        </div>
        <button id="roll-btn">🎲 ارم النرد!</button>
        <button id="reset-btn">🔄 بداية جديدة</button>
        <div id="message">اضغط لبدء اللعب</div>
      </div>
    </div>
  </div>

  <!-- نافذة الفوز -->
  <div id="win-overlay">
    <div class="win-box">
      <div class="trophy">🏆</div>
      <h2 id="win-message">فاز اللاعب!</h2>
      <button onclick="resetGame()">العب مرة أخرى</button>
    </div>
  </div>

  <script>
    // ==================== الإعدادات ====================
    const PLAYER_COLORS = ['#e53935', '#1565C0', '#2e7d32', '#F9A825'];
    const PLAYER_EMOJIS = ['🔴', '🔵', '🟢', '🟡'];
    const PLAYER_NAMES = ['لاعب 1', 'لاعب 2', 'لاعب 3', 'لاعب 4'];
    // الثعابين الكلاسيكية (الرأس => الذيل)
    const SNAKES = [
      { head: 98, tail: 78, color: '#388e3c' },
      { head: 95, tail: 56, color: '#7b1fa2' },
      { head: 93, tail: 73, color: '#e64a19' },
      { head: 87, tail: 24, color: '#c62828' },
      { head: 64, tail: 60, color: '#00838f' },
      { head: 62, tail: 19, color: '#558b2f' },
      { head: 49, tail: 11, color: '#e65100' },
      { head: 48, tail: 26, color: '#00695c' },
      { head: 16, tail: 6, color: '#6a1de8' }
    ];
    // السلالم (من => إلى)
    const LADDERS = [
      { from: 1, to: 38, color: '#8d4e1a' },
      { from: 4, to: 14, color: '#1565C0' },
      { from: 9, to: 31, color: '#2e7d32' },
      { from: 20, to: 42, color: '#c62828' },
      { from: 28, to: 84, color: '#4527a0' },
      { from: 40, to: 59, color: '#00695c' },
      { from: 51, to: 67, color: '#e65100' },
      { from: 63, to: 81, color: '#1565C0' },
      { from: 71, to: 91, color: '#2e7d32' }
    ];
    // ألوان المربعات
    const CELL_COLORS = ['#e53935', '#FDD835', '#43A047', '#1E88E5'];

    // ==================== حالة اللعبة ====================
    let numPlayers = 2; // يمكن تغييرها إلى 4
    let positions = [];
    let currentPlayer = 0;
    let busy = false;
    let cellSize = 50; // سيتم حسابه لاحقاً

    // عناصر canvas
    let boardCanvas, boardCtx, tokenCanvas, tokenCtx, diceCanvas, diceCtx;

    // ==================== تحويل الرقم إلى إحداثيات (نمط متعرج) ====================
    function numToGrid(n) {
      const idx = n - 1;
      const row9 = Math.floor(idx / 10);    // 0 = الصف العلوي (رقم 91-100)
      const col9 = idx % 10;
      // الصفوف الزوجية (من الأعلى) من اليسار لليمين، الفردية من اليمين لليسار
      return {
        row: 9 - row9,
        col: (row9 % 2 === 0) ? col9 : 9 - col9
      };
    }

    function getCellCenter(n) {
      const { row, col } = numToGrid(n);
      return { x: col * cellSize + cellSize/2, y: row * cellSize + cellSize/2 };
    }

    // ==================== رسم اللوحة ====================
    function drawBoard() {
      const size = cellSize * 10;
      boardCanvas.width = size;
      boardCanvas.height = size;
      boardCtx.clearRect(0, 0, size, size);

      // رسم المربعات
      for (let r = 0; r < 10; r++) {
        for (let c = 0; c < 10; c++) {
          const colorIndex = (r * 3 + c * 7) % 4;
          boardCtx.fillStyle = CELL_COLORS[colorIndex];
          boardCtx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
          boardCtx.strokeStyle = 'rgba(0,0,0,0.3)';
          boardCtx.lineWidth = 0.5;
          boardCtx.strokeRect(c * cellSize, r * cellSize, cellSize, cellSize);
        }
      }

      // رسم الثعابين
      SNAKES.forEach(s => {
        const head = getCellCenter(s.head);
        const tail = getCellCenter(s.tail);
        boardCtx.save();
        boardCtx.strokeStyle = s.color;
        boardCtx.lineWidth = cellSize * 0.2;
        boardCtx.beginPath();
        boardCtx.moveTo(tail.x, tail.y);
        boardCtx.lineTo(head.x, head.y);
        boardCtx.stroke();
        boardCtx.restore();
      });

      // رسم السلالم
      LADDERS.forEach(l => {
        const from = getCellCenter(l.from);
        const to = getCellCenter(l.to);
        boardCtx.save();
        boardCtx.strokeStyle = l.color;
        boardCtx.lineWidth = cellSize * 0.1;
        boardCtx.beginPath();
        boardCtx.moveTo(from.x, from.y);
        boardCtx.lineTo(to.x, to.y);
        boardCtx.stroke();
        boardCtx.restore();
      });

      // رسم الأرقام
      boardCtx.font = `bold ${cellSize * 0.25}px Tajawal, Arial`;
      boardCtx.fillStyle = 'rgba(0,0,0,0.8)';
      boardCtx.textAlign = 'right';
      boardCtx.textBaseline = 'top';
      for (let n = 1; n <= 100; n++) {
        const { row, col } = numToGrid(n);
        boardCtx.fillText(n, col * cellSize + cellSize - 3, row * cellSize + 2);
      }

      // رسم رمز المنزل في 100
      const home = getCellCenter(100);
      boardCtx.font = `${cellSize * 0.4}px serif`;
      boardCtx.textAlign = 'center';
      boardCtx.textBaseline = 'middle';
      boardCtx.fillText('🏠', home.x, home.y);
    }

    // ==================== رسم قطع اللاعبين ====================
    function drawTokens() {
      tokenCanvas.width = boardCanvas.width;
      tokenCanvas.height = boardCanvas.height;
      tokenCtx.clearRect(0, 0, tokenCanvas.width, tokenCanvas.height);

      const offsets = [
        { dx: -cellSize*0.15, dy: -cellSize*0.15 },
        { dx: cellSize*0.15, dy: -cellSize*0.15 },
        { dx: -cellSize*0.15, dy: cellSize*0.15 },
        { dx: cellSize*0.15, dy: cellSize*0.15 }
      ];

      for (let i = 0; i < numPlayers; i++) {
        if (positions[i] === 0) continue;
        const center = getCellCenter(positions[i]);
        const x = center.x + offsets[i].dx;
        const y = center.y + offsets[i].dy;
        drawToken(tokenCtx, x, y, PLAYER_COLORS[i], i === currentPlayer);
      }
    }

    function drawToken(ctx, x, y, color, active) {
      const r = cellSize * 0.17;
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 5;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, 2 * Math.PI);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = active ? '#FFD700' : 'white';
      ctx.lineWidth = active ? 3 : 1.5;
      ctx.stroke();
      ctx.restore();
    }

    // ==================== رسم النرد ====================
    const PIP_POS = {
      1: [[0.5, 0.5]],
      2: [[0.25, 0.25], [0.75, 0.75]],
      3: [[0.25, 0.25], [0.5, 0.5], [0.75, 0.75]],
      4: [[0.25, 0.25], [0.75, 0.25], [0.25, 0.75], [0.75, 0.75]],
      5: [[0.25, 0.25], [0.75, 0.25], [0.5, 0.5], [0.25, 0.75], [0.75, 0.75]],
      6: [[0.25, 0.2], [0.75, 0.2], [0.25, 0.5], [0.75, 0.5], [0.25, 0.8], [0.75, 0.8]]
    };

    function drawDiceFace(value) {
      diceCtx.clearRect(0, 0, 60, 60);
      diceCtx.fillStyle = 'white';
      diceCtx.fillRect(0, 0, 60, 60);
      diceCtx.strokeStyle = '#ccc';
      diceCtx.lineWidth = 2;
      diceCtx.strokeRect(1, 1, 58, 58);
      const pips = PIP_POS[value] || [];
      pips.forEach(([x, y]) => {
        diceCtx.beginPath();
        diceCtx.arc(x * 60, y * 60, 5, 0, 2 * Math.PI);
        diceCtx.fillStyle = '#1a1a1a';
        diceCtx.fill();
      });
    }

    // ==================== واجهة اللاعبين ====================
    function renderPlayersList() {
      const container = document.getElementById('players-list');
      container.innerHTML = '';
      for (let i = 0; i < numPlayers; i++) {
        const div = document.createElement('div');
        div.className = `player-item ${i === currentPlayer ? 'active' : ''}`;
        div.id = `player-${i}`;
        div.innerHTML = `
          <div class="player-dot" style="background: ${PLAYER_COLORS[i]};"></div>
          <div class="player-info">
            <div class="player-name">${PLAYER_EMOJIS[i]} ${PLAYER_NAMES[i]}</div>
            <div class="player-pos" id="pos-${i}">${positions[i] ? 'مربع ' + positions[i] : 'البداية'}</div>
          </div>
          <div class="turn-badge">دورك</div>
        `;
        container.appendChild(div);
      }
    }

    function updatePlayersList() {
      for (let i = 0; i < numPlayers; i++) {
        const item = document.getElementById(`player-${i}`);
        if (item) {
          item.className = `player-item ${i === currentPlayer ? 'active' : ''}`;
          document.getElementById(`pos-${i}`).textContent = positions[i] ? 'مربع ' + positions[i] : 'البداية';
        }
      }
    }

    function setMessage(text, type = '') {
      const msgDiv = document.getElementById('message');
      msgDiv.textContent = text;
      msgDiv.className = type;
    }

    // ==================== منطق الحركة ====================
    async function movePlayer(playerIndex, steps) {
      let newPos = positions[playerIndex] + steps;
      if (newPos > 100) {
        setMessage(`تحتاج ${100 - positions[playerIndex]} بالضبط للفوز!`);
        return false;
      }

      positions[playerIndex] = newPos;
      drawTokens();
      updatePlayersList();
      await delay(500);

      if (newPos === 100) {
        setMessage(`🎉 ${PLAYER_NAMES[playerIndex]} فاز!`, 'win');
        document.getElementById('win-message').textContent = `${PLAYER_EMOJIS[playerIndex]} ${PLAYER_NAMES[playerIndex]} فاز باللعبة!`;
        document.getElementById('win-overlay').style.display = 'flex';
        return true;
      }

      // تحقق من الثعبان
      const snake = SNAKES.find(s => s.head === newPos);
      if (snake) {
        setMessage(`🐍 ثعبان! ${newPos} ← ${snake.tail}`, 'snake');
        await delay(700);
        positions[playerIndex] = snake.tail;
        drawTokens();
        updatePlayersList();
        await delay(300);
        return false;
      }

      // تحقق من السلم
      const ladder = LADDERS.find(l => l.from === newPos);
      if (ladder) {
        setMessage(`🪜 سلم! ${newPos} ↑ ${ladder.to}`, 'ladder');
        await delay(700);
        positions[playerIndex] = ladder.to;
        drawTokens();
        updatePlayersList();
        await delay(300);
        return false;
      }

      setMessage(`${PLAYER_NAMES[playerIndex]} في مربع ${newPos}`);
      return false;
    }

    const delay = ms => new Promise(res => setTimeout(res, ms));

    // ==================== إعادة الضبط ====================
    function resetGame() {
      document.getElementById('win-overlay').style.display = 'none';
      positions = new Array(numPlayers).fill(0);
      currentPlayer = 0;
      busy = false;
      drawTokens();
      updatePlayersList();
      setMessage('دور اللاعب 1');
      document.getElementById('roll-btn').disabled = false;
    }

    // ==================== بدء اللعبة (يُستدعى عند تحميل الصفحة) ====================
    function initGame() {
      boardCanvas = document.getElementById('board-canvas');
      boardCtx = boardCanvas.getContext('2d');
      tokenCanvas = document.getElementById('token-canvas');
      tokenCtx = tokenCanvas.getContext('2d');
      diceCanvas = document.getElementById('dice-canvas');
      diceCtx = diceCanvas.getContext('2d');

      // حساب حجم الخلية بناءً على حجم النافذة
      const minDim = Math.min(window.innerWidth - 300, window.innerHeight - 100, 600);
      cellSize = Math.floor(minDim / 10);
      boardCanvas.width = boardCanvas.height = cellSize * 10;

      // تهيئة اللاعبين
      positions = new Array(numPlayers).fill(0);
      currentPlayer = 0;
      renderPlayersList();

      drawBoard();
      drawTokens();
      drawDiceFace(1);
      setMessage('دور اللاعب 1');

      // أحداث الأزرار
      document.getElementById('roll-btn').addEventListener('click', async () => {
        if (busy) return;
        busy = true;
        const btn = document.getElementById('roll-btn');
        btn.disabled = true;

        // حركة النرد
        const diceBox = document.getElementById('dice-box');
        diceBox.classList.add('rolling');
        for (let i = 0; i < 8; i++) {
          drawDiceFace(Math.floor(Math.random() * 6) + 1);
          await delay(50);
        }
        diceBox.classList.remove('rolling');
        const diceValue = Math.floor(Math.random() * 6) + 1;
        drawDiceFace(diceValue);

        setMessage(`${PLAYER_EMOJIS[currentPlayer]} رمى ${diceValue}`);
        await delay(400);

        const won = await movePlayer(currentPlayer, diceValue);
        if (won) {
          busy = false;
          return;
        }

        // التبديل إلى اللاعب التالي
        currentPlayer = (currentPlayer + 1) % numPlayers;
        updatePlayersList();
        setMessage(`دور ${PLAYER_NAMES[currentPlayer]}`);
        btn.disabled = false;
        busy = false;
      });

      document.getElementById('reset-btn').addEventListener('click', resetGame);
    }

    window.addEventListener('load', initGame);
    window.addEventListener('resize', () => {
      if (!boardCanvas) return;
      const minDim = Math.min(window.innerWidth - 300, window.innerHeight - 100, 600);
      cellSize = Math.floor(minDim / 10);
      boardCanvas.width = boardCanvas.height = cellSize * 10;
      drawBoard();
      drawTokens();
    });
  </script>
</body>
</html>
