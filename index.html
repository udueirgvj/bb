<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الثعبان - نسخة الصورة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- شاشة تسجيل الدخول (نفس السابق) -->
    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <h2>مرحباً بك في اللعبة</h2>
            <div id="auth-tabs">
                <button class="tab-btn active" onclick="showTab('login')">تسجيل الدخول</button>
                <button class="tab-btn" onclick="showTab('signup')">إنشاء حساب</button>
            </div>
            <div id="login-form" class="auth-form">
                <input type="email" id="login-email" placeholder="البريد الإلكتروني" required>
                <input type="password" id="login-password" placeholder="كلمة المرور" required>
                <button onclick="login()">دخول</button>
                <p id="login-error" class="error"></p>
            </div>
            <div id="signup-form" class="auth-form" style="display: none;">
                <input type="text" id="signup-username" placeholder="اسم المستخدم" required>
                <input type="email" id="signup-email" placeholder="البريد الإلكتروني" required>
                <input type="password" id="signup-password" placeholder="كلمة المرور" required>
                <button onclick="signup()">إنشاء حساب</button>
                <p id="signup-error" class="error"></p>
            </div>
        </div>
    </div>

    <!-- الصفحة الرئيسية -->
    <div id="main-screen" class="screen">
        <h2>أهلاً <span id="display-name"></span>!</h2>
        <div id="friends-list">
            <h3>قائمة الأصدقاء</h3>
            <ul id="friends"></ul>
            <div class="add-friend">
                <input type="email" id="friend-email" placeholder="البريد الإلكتروني للصديق">
                <button onclick="addFriend()">إضافة</button>
            </div>
        </div>
        <button class="start-btn" onclick="startGame()">بدء اللعبة</button>
        <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
    </div>

    <!-- ساحة اللعب (بالتصميم الجديد) -->
    <div id="game-screen" class="screen">
        <h2>ساحة اللعب</h2>
        <div id="board"></div>
        <div id="dice-area">
            <button onclick="rollDice()" id="roll-btn">🎲 ارم النرد</button>
            <span id="dice-result"></span>
        </div>
        <div id="players-status"></div>
        <button onclick="leaveGame()" class="leave-btn">خروج</button>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
