<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الثعابين والسلالم - النسخة الكلاسيكية</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:'Tajawal',sans-serif;
  background:#b71c1c;
  display:flex;align-items:center;justify-content:center;
}
#app{
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  gap:8px;
  width:100vw;height:100vh;
  padding:8px;
}
#board-wrap{
  position:relative;flex-shrink:0;
  line-height:0;
}
#board-canvas{
  display:block;
  border:4px solid #FFD700;
  border-radius:4px;
  box-shadow:0 0 0 2px #880000, 0 6px 30px rgba(0,0,0,0.7);
}
#token-canvas{
  position:absolute;top:0;left:0;
  pointer-events:none;
}
/* PANEL */
#panel{
  display:flex;flex-direction:column;gap:7px;
  flex:1;min-width:130px;max-width:180px;
  overflow:hidden;align-self:center;
}
.pbox{
  background:rgba(0,0,0,0.4);
  border:2px solid rgba(255,215,0,0.35);
  border-radius:12px;padding:8px;color:#fff;
}
.pbox h3{
  color:#FFD700;font-size:0.82rem;font-weight:900;
  text-align:center;
  border-bottom:1px solid rgba(255,215,0,0.3);
  padding-bottom:5px;margin-bottom:7px;
}
.pcard{
  display:flex;align-items:center;gap:5px;
  padding:5px 6px;border-radius:8px;
  border:2px solid transparent;
  background:rgba(0,0,0,0.2);
  margin-bottom:5px;transition:all 0.3s;
}
.pcard.active{border-color:#FFD700;background:rgba(255,215,0,0.12);}
.pdot{width:16px;height:16px;border-radius:50%;border:2px solid #fff;flex-shrink:0;}
.pname{font-size:0.72rem;font-weight:700;}
.ppos{font-size:0.63rem;color:rgba(255,255,255,0.6);}
.pturn{background:#FFD700;color:#000;font-size:0.52rem;font-weight:900;
  padding:1px 4px;border-radius:5px;display:none;margin-right:auto;}
.pcard.active .pturn{display:block;}
/* DICE */
#dice-box{text-align:center;}
#dice-display{
  width:60px;height:60px;
  background:white;border-radius:10px;
  margin:0 auto 8px;
  box-shadow:0 3px 10px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.9);
  position:relative;overflow:hidden;
  animation-name:none;
}
#dice-display.rolling{animation:rollA 0.5s ease;}
@keyframes rollA{
  0%{transform:rotate(0)scale(1);}
  25%{transform:rotate(18deg)scale(1.1);}
  50%{transform:rotate(-12deg)scale(0.9);}
  75%{transform:rotate(8deg)scale(1.05);}
  100%{transform:rotate(0)scale(1);}
}
#dice-canvas{display:block;width:60px;height:60px;}
#roll-btn{
  width:100%;padding:9px;
  background:linear-gradient(135deg,#FFD700,#FF8C00);
  color:#000;border:none;border-radius:22px;
  font-family:'Tajawal',sans-serif;font-size:0.92rem;font-weight:900;
  cursor:pointer;
  box-shadow:0 3px 12px rgba(255,140,0,0.5);
  transition:all 0.2s;margin-bottom:5px;
}
#roll-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 5px 18px rgba(255,140,0,0.7);}
#roll-btn:disabled{opacity:0.45;cursor:not-allowed;}
#reset-btn{
  width:100%;padding:6px;
  background:rgba(255,255,255,0.1);color:#fff;
  border:1px solid rgba(255,255,255,0.3);
  border-radius:16px;font-family:'Tajawal',sans-serif;
  font-size:0.78rem;font-weight:700;cursor:pointer;transition:all 0.2s;
}
#reset-btn:hover{background:rgba(255,255,255,0.2);}
#msg{
  padding:6px 8px;border-radius:8px;
  font-size:0.74rem;font-weight:700;
  text-align:center;min-height:36px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.3);
  border:1px solid rgba(255,255,255,0.1);
  color:#fff;line-height:1.3;margin-top:4px;
}
#msg.snake{background:rgba(200,30,30,0.35);border-color:#FF5252;color:#FFCDD2;}
#msg.ladder{background:rgba(30,150,30,0.35);border-color:#66BB6A;color:#C8E6C9;}
#msg.win{background:rgba(255,215,0,0.25);border-color:#FFD700;color:#FFD700;}
/* WIN */
#win-ov{display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.85);z-index:999;
  align-items:center;justify-content:center;}
#win-ov.show{display:flex;}
.winbox{
  background:linear-gradient(135deg,#1a0022,#0a1040);
  border:3px solid #FFD700;border-radius:18px;
  padding:36px;text-align:center;
  box-shadow:0 0 60px rgba(255,215,0,0.5);
  animation:popin 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popin{from{transform:scale(0.3);opacity:0;}to{transform:scale(1);opacity:1;}}
.winbox .we{font-size:3.5rem;margin-bottom:8px;}
.winbox .wt{color:#FFD700;font-size:1.8rem;font-weight:900;margin-bottom:6px;}
.winbox .ws{color:#fff;font-size:1rem;margin-bottom:18px;}
.winbox button{
  background:linear-gradient(135deg,#FFD700,#FF8C00);
  color:#000;border:none;padding:10px 28px;
  border-radius:22px;font-family:'Tajawal',sans-serif;
  font-size:1rem;font-weight:900;cursor:pointer;
}
</style>
</head>
<body>
<div id="app">
  <div id="board-wrap">
    <canvas id="board-canvas"></canvas>
    <canvas id="token-canvas"></canvas>
  </div>
  <div id="panel">
    <div class="pbox">
      <h3>🎮 اللاعبون</h3>
      <div id="pcards"></div>
    </div>
    <div class="pbox" id="dice-box">
      <h3>🎲 النرد</h3>
      <div id="dice-display"><canvas id="dice-canvas" width="60" height="60"></canvas></div>
      <button id="roll-btn">ارمِ النرد!</button>
      <button id="reset-btn">🔄 بداية جديدة</button>
      <div id="msg">اضغط لرمي النرد!</div>
    </div>
  </div>
</div>
<div id="win-ov">
  <div class="winbox">
    <div class="we">🏆</div>
    <div class="wt">مبروك!</div>
    <div class="ws" id="win-txt"></div>
    <button onclick="resetGame()">العب مرة أخرى</button>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const PLAYER_COLORS = ['#e53935','#1565C0','#2e7d32','#F9A825'];
const PLAYER_EMOJIS = ['🔴','🔵','🟢','🟡'];
const PLAYER_NAMES  = ['لاعب 1','لاعب 2','لاعب 3','لاعب 4'];

// الثعابين الكلاسيكية (رأس ← ذيل)
const SNAKES = [
  {head:98, tail:78, body:'#388e3c', head_c:'#1b5e20', belly:'#a5d6a7'},
  {head:95, tail:56, body:'#7b1fa2', head_c:'#4a148c', belly:'#ce93d8'},
  {head:93, tail:73, body:'#e64a19', head_c:'#bf360c', belly:'#ffccbc'},
  {head:87, tail:24, body:'#c62828', head_c:'#7f0000', belly:'#ef9a9a'},
  {head:64, tail:60, body:'#00838f', head_c:'#006064', belly:'#80deea'},
  {head:62, tail:19, body:'#558b2f', head_c:'#33691e', belly:'#dcedc8'},
  {head:49, tail:11, body:'#e65100', head_c:'#bf360c', belly:'#ffccbc'},
  {head:48, tail:26, body:'#00695c', head_c:'#004d40', belly:'#b2dfdb'},
  {head:16, tail:6,  body:'#6a1de8', head_c:'#311b92', belly:'#d1c4e9'},
];

// السلالم الكلاسيكية (أسفل ← أعلى)
const LADDERS = [
  {from:1,  to:38,  color:'#8d4e1a'},
  {from:4,  to:14,  color:'#1565C0'},
  {from:9,  to:31,  color:'#2e7d32'},
  {from:20, to:42,  color:'#c62828'},
  {from:28, to:84,  color:'#4527a0'},
  {from:40, to:59,  color:'#00695c'},
  {from:51, to:67,  color:'#e65100'},
  {from:63, to:81,  color:'#1565C0'},
  {from:71, to:91,  color:'#2e7d32'},
];

// ألوان المربعات (4 ألوان متناوبة)
const GRID_COLORS = ['#e53935','#FDD835','#43A047','#1E88E5'];

// ============================================================
// STATE
// ============================================================
let C = 52;  // حجم المربع بالبكسل
let numPlayers, positions, currentPlayer, busy;
let boardCanvas, boardCtx, tokenCanvas, tokenCtx, diceCanvas, diceCtx;

// ============================================================
// تحويل الرقم إلى إحداثيات الصف والعمود (نمط متعرج)
// ============================================================
function numToGrid(n){ // returns {row,col}  row=0 في الأعلى
  const idx = n - 1;
  const row9 = Math.floor(idx / 10);
  const col9 = idx % 10;
  // الصفوف الزوجية (من الأعلى) من اليسار لليمين، الفردية من اليمين لليسار
  return { row: 9 - row9, col: (row9 % 2 === 0) ? col9 : 9 - col9 };
}

// مركز المربع بالإحداثيات
function cellCenter(n){
  const {row,col} = numToGrid(n);
  return { x: col*C + C/2, y: row*C + C/2 };
}

// ============================================================
// رسم اللوحة
// ============================================================
function drawBoard(){
  const S = C*10;
  boardCanvas.width = S; boardCanvas.height = S;
  const ctx = boardCtx;

  // تعبئة المربعات
  for(let row=0;row<10;row++){
    for(let col=0;col<10;col++){
      const ci = (row*3 + col*7) % 4;
      ctx.fillStyle = GRID_COLORS[ci];
      ctx.fillRect(col*C, row*C, C, C);
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 0.7;
      ctx.strokeRect(col*C+0.4, row*C+0.4, C-0.8, C-0.8);
    }
  }

  // رسم الثعابين (تحت الأرقام)
  SNAKES.forEach(s => drawSnake(ctx, s));
  // رسم السلالم
  LADDERS.forEach(l => drawLadder(ctx, l));

  // كتابة الأرقام
  ctx.textBaseline = 'top';
  ctx.textAlign = 'right';
  for(let n=1;n<=100;n++){
    const {row,col} = numToGrid(n);
    ctx.font = `bold ${Math.round(C*0.24)}px Tajawal,Arial`;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillText(n, col*C + C - 3, row*C + 2);
  }

  // رمز المنزل على 100
  const h = numToGrid(100);
  ctx.font = `${Math.round(C*0.45)}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🏠', h.col*C+C/2, h.row*C+C/2);
}

// ============================================================
// رسم ثعبان (محسن)
// ============================================================
function drawSnake(ctx, s){
  const hc = cellCenter(s.head);
  const tc = cellCenter(s.tail);
  const path = buildSnakePath(hc, tc, s.head);
  const bw = C * 0.26;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.45)';
  ctx.shadowBlur = 5;
  strokePath(ctx, path, bw + 4, 'rgba(0,0,0,0.4)');
  ctx.shadowBlur = 0;

  strokePath(ctx, path, bw, s.body);
  const dark = shiftColor(s.body, -50);
  strokePathDashed(ctx, path, bw * 0.6, dark, [C*0.3, C*0.25]);
  strokePath(ctx, path, bw * 0.35, s.belly);
  ctx.restore();

  drawBodyScales(ctx, path, bw, s.body, dark);
  drawSnakeHead(ctx, path, s);
  drawSnakeTailTip(ctx, path, s.body);
}

function buildSnakePath(hc, tc, headNum){
  const pts = [tc];
  const dx = hc.x - tc.x;
  const dy = hc.y - tc.y;
  const dist = Math.hypot(dx,dy);
  const segs = Math.max(4, Math.round(dist / (C*1.0)));
  const angle = Math.atan2(dy,dx);
  const perp = angle + Math.PI/2;

  for(let i=1;i<segs;i++){
    const t = i/segs;
    const bx = tc.x + dx*t;
    const by = tc.y + dy*t;
    const env = Math.sin(t*Math.PI);
    const freq = 2.0 + (headNum % 2) * 0.5;
    const amp = C * 0.85 * env * Math.sin(t * Math.PI * freq + headNum * 0.7);
    pts.push({
      x: bx + Math.cos(perp)*amp,
      y: by + Math.sin(perp)*amp
    });
  }
  pts.push(hc);
  return pts;
}

function strokePath(ctx, pts, width, color){
  if(pts.length<2) return;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for(let i=1;i<pts.length-1;i++){
    const mx=(pts[i].x+pts[i+1].x)/2;
    const my=(pts[i].y+pts[i+1].y)/2;
    ctx.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);
  }
  ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
  ctx.strokeStyle=color;
  ctx.lineWidth=width;
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.stroke();
}

function strokePathDashed(ctx, pts, width, color, dash){
  ctx.save();
  ctx.setLineDash(dash);
  strokePath(ctx,pts,width,color);
  ctx.setLineDash([]);
  ctx.restore();
}

function drawBodyScales(ctx, pts, bw, bodyColor, dark){
  ctx.save();
  ctx.lineWidth = 0.9;
  ctx.strokeStyle = dark;
  ctx.globalAlpha = 0.5;
  const n = pts.length;
  for(let i=1;i<n-1;i+=0.5){
    const idx = Math.min(Math.floor(i), n-2);
    const f = i - Math.floor(i);
    const px = pts[idx].x + (pts[idx+1].x-pts[idx].x)*f;
    const py = pts[idx].y + (pts[idx+1].y-pts[idx].y)*f;
    const ax = pts[Math.min(idx+1,n-1)].x - pts[idx].x;
    const ay = pts[Math.min(idx+1,n-1)].y - pts[idx].y;
    const ang = Math.atan2(ay,ax);
    ctx.beginPath();
    ctx.arc(px, py, bw*0.28, ang+0.4, ang+Math.PI-0.4);
    ctx.stroke();
  }
  ctx.restore();
}

function drawSnakeHead(ctx, pts, s){
  const n = pts.length;
  const head = pts[n-1];
  const prev = pts[n-2];
  const angle = Math.atan2(head.y-prev.y, head.x-prev.x);
  const R = C * 0.21;

  ctx.save();
  ctx.translate(head.x, head.y);
  ctx.rotate(angle);

  ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=4;
  ctx.beginPath();
  ctx.ellipse(0, 0, R*1.5, R*1.05, 0, 0, Math.PI*2);
  ctx.fillStyle = s.head_c;
  ctx.fill();
  ctx.strokeStyle = shiftColor(s.head_c,-50);
  ctx.lineWidth=1.5; ctx.stroke();
  ctx.shadowBlur=0;

  ctx.beginPath();
  ctx.ellipse(R*0.2, -R*0.3, R*0.6, R*0.45, -0.3, 0, Math.PI*2);
  ctx.fillStyle = shiftColor(s.head_c,20);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(R*0.55, -R*0.42, R*0.25, 0, Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.beginPath();
  ctx.arc(R*0.6, -R*0.42, R*0.13, 0, Math.PI*2);
  ctx.fillStyle='#111'; ctx.fill();
  ctx.beginPath();
  ctx.arc(R*0.55, -R*0.48, R*0.06, 0, Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();

  ctx.beginPath();
  ctx.arc(R*1.2, -R*0.18, R*0.07, 0, Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fill();

  ctx.strokeStyle='#e53935';
  ctx.lineWidth=1.6; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(R*1.35, 0.5);
  ctx.lineTo(R*2.1, 0.5);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(R*2.1, 0.5);
  ctx.lineTo(R*2.6, -R*0.35);
  ctx.moveTo(R*2.1, 0.5);
  ctx.lineTo(R*2.6, R*0.45);
  ctx.stroke();

  ctx.restore();
}

function drawSnakeTailTip(ctx, pts, color){
  const p0=pts[0], p1=pts[1];
  const angle = Math.atan2(p1.y-p0.y, p1.x-p0.x)+Math.PI;
  ctx.save();
  ctx.translate(p0.x,p0.y); ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(C*0.1,-C*0.05, C*0.2,-C*0.03, C*0.22,0);
  ctx.bezierCurveTo(C*0.2,C*0.03, C*0.1,C*0.05, 0,0);
  ctx.fillStyle=shiftColor(color,-25);
  ctx.fill();
  ctx.restore();
}

// ============================================================
// رسم سلم
// ============================================================
function drawLadder(ctx, l){
  const fc = cellCenter(l.from);
  const tc = cellCenter(l.to);

  const angle = Math.atan2(tc.y-fc.y, tc.x-fc.x);
  const perp = angle + Math.PI/2;
  const half = C * 0.13;
  const dist = Math.hypot(tc.x-fc.x, tc.y-fc.y);
  const rungCount = Math.max(3, Math.round(dist/(C*0.55)));

  const lc = l.color;
  const dk = shiftColor(l.color, -55);

  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.35)';ctx.shadowBlur=3;

  for(const side of [-1,1]){
    const x1=fc.x+Math.cos(perp)*half*side, y1=fc.y+Math.sin(perp)*half*side;
    const x2=tc.x+Math.cos(perp)*half*side, y2=tc.y+Math.sin(perp)*half*side;
    ctx.beginPath();ctx.moveTo(x1+1,y1+1);ctx.lineTo(x2+1,y2+1);
    ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=C*0.1+2;ctx.lineCap='round';ctx.stroke();
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
    ctx.strokeStyle=lc;ctx.lineWidth=C*0.1;ctx.stroke();
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=C*0.03;ctx.stroke();
  }

  ctx.shadowBlur=0;

  for(let i=1;i<rungCount;i++){
    const t=i/rungCount;
    const mx=fc.x+(tc.x-fc.x)*t, my=fc.y+(tc.y-fc.y)*t;
    const rx1=mx+Math.cos(perp)*half, ry1=my+Math.sin(perp)*half;
    const rx2=mx-Math.cos(perp)*half, ry2=my-Math.sin(perp)*half;
    ctx.beginPath();ctx.moveTo(rx1+0.5,ry1+0.5);ctx.lineTo(rx2+0.5,ry2+0.5);
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=C*0.09;ctx.lineCap='round';ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx1,ry1);ctx.lineTo(rx2,ry2);
    ctx.strokeStyle=dk;ctx.lineWidth=C*0.08;ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx1,ry1);ctx.lineTo(rx2,ry2);
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=C*0.025;ctx.stroke();
  }

  for(const pt of [fc,tc]){
    ctx.beginPath();ctx.arc(pt.x,pt.y,C*0.08,0,Math.PI*2);
    ctx.fillStyle=dk;ctx.fill();
  }

  ctx.restore();
}

// ============================================================
// رسم النرد (نقاط)
// ============================================================
const PIP_POS = {
  1:[[0.5,0.5]],
  2:[[0.25,0.25],[0.75,0.75]],
  3:[[0.25,0.25],[0.5,0.5],[0.75,0.75]],
  4:[[0.25,0.25],[0.75,0.25],[0.25,0.75],[0.75,0.75]],
  5:[[0.25,0.25],[0.75,0.25],[0.5,0.5],[0.25,0.75],[0.75,0.75]],
  6:[[0.25,0.2],[0.75,0.2],[0.25,0.5],[0.75,0.5],[0.25,0.8],[0.75,0.8]],
};

function drawDiceFace(val){
  const dc=diceCanvas, dc2=diceCtx;
  const W=dc.width, H=dc.height;
  dc2.clearRect(0,0,W,H);

  dc2.fillStyle='#fff';
  roundRect(dc2,0,0,W,H,8);
  dc2.fill();

  dc2.strokeStyle='#ccc';dc2.lineWidth=1.5;
  roundRect(dc2,0,0,W,H,8);
  dc2.stroke();

  const pips = PIP_POS[val]||[];
  const pr = W*0.1;
  pips.forEach(([fx,fy])=>{
    const x=fx*W, y=fy*H;
    dc2.beginPath();dc2.arc(x,y,pr,0,Math.PI*2);
    dc2.fillStyle='#1a1a1a';dc2.fill();
  });
}
function roundRect(ctx2,x,y,w,h,r){
  ctx2.beginPath();
  ctx2.moveTo(x+r,y);ctx2.lineTo(x+w-r,y);
  ctx2.arcTo(x+w,y,x+w,y+r,r);
  ctx2.lineTo(x+w,y+h-r);
  ctx2.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx2.lineTo(x+r,y+h);
  ctx2.arcTo(x,y+h,x,y+h-r,r);
  ctx2.lineTo(x,y+r);
  ctx2.arcTo(x,y,x+r,y,r);
  ctx2.closePath();
}

// ============================================================
// رسم قطع اللاعبين
// ============================================================
function drawTokens(){
  const tc=tokenCanvas, tc2=tokenCtx;
  tc.width=boardCanvas.width; tc.height=boardCanvas.height;
  tc2.clearRect(0,0,tc.width,tc.height);

  const offsets=[
    {ox:-C*0.14,oy:-C*0.14},
    {ox: C*0.14,oy:-C*0.14},
    {ox:-C*0.14,oy: C*0.14},
    {ox: C*0.14,oy: C*0.14},
  ];

  for(let i=0;i<numPlayers;i++){
    const pos=positions[i];
    if(pos<=0) continue;
    const {x,y}=cellCenter(pos);
    const {ox,oy}=offsets[i];
    drawToken(tc2, x+ox, y+oy, PLAYER_COLORS[i], i===currentPlayer);
  }
}

function drawToken(ctx2, x, y, color, active){
  const r=C*0.17;
  ctx2.save();
  ctx2.shadowColor='rgba(0,0,0,0.5)';ctx2.shadowBlur=4;
  ctx2.beginPath();
  ctx2.moveTo(x, y+r*1.5);
  ctx2.bezierCurveTo(x-r*0.5,y+r*0.5, x-r*1.1,y-r*0.4, x-r*0.85,y-r*1.1);
  ctx2.arc(x,y-r*1.1,r*0.85,Math.PI,0);
  ctx2.bezierCurveTo(x+r*1.1,y-r*0.4, x+r*0.5,y+r*0.5, x,y+r*1.5);
  ctx2.fillStyle=color;ctx2.fill();
  if(active){ctx2.strokeStyle='#FFD700';ctx2.lineWidth=2.5;}
  else{ctx2.strokeStyle='rgba(255,255,255,0.7)';ctx2.lineWidth=1.5;}
  ctx2.stroke();
  ctx2.shadowBlur=0;
  ctx2.beginPath();
  ctx2.arc(x-r*0.3, y-r*1.35, r*0.28, 0, Math.PI*2);
  ctx2.fillStyle='rgba(255,255,255,0.65)';ctx2.fill();
  ctx2.restore();
}

// ============================================================
// أدوات الألوان
// ============================================================
function shiftColor(hex, amt){
  if(hex.startsWith('rgb')){
    const m=hex.match(/\d+/g);
    return `rgb(${clamp(+m[0]+amt)},${clamp(+m[1]+amt)},${clamp(+m[2]+amt)})`;
  }
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `rgb(${clamp(r+amt)},${clamp(g+amt)},${clamp(b+amt)})`;
}
function clamp(v){return Math.max(0,Math.min(255,Math.round(v)));}

// ============================================================
// واجهة اللاعبين
// ============================================================
function buildPlayerCards(){
  const c=document.getElementById('pcards');
  c.innerHTML='';
  for(let i=0;i<numPlayers;i++){
    c.innerHTML+=`<div class="pcard${i===0?' active':''}" id="pc${i}">
      <div class="pdot" style="background:${PLAYER_COLORS[i]}"></div>
      <div><div class="pname">${PLAYER_EMOJIS[i]} ${PLAYER_NAMES[i]}</div>
      <div class="ppos" id="pp${i}">الانتظار</div></div>
      <div class="pturn">دورك</div>
    </div>`;
  }
}
function updateCards(){
  for(let i=0;i<numPlayers;i++){
    document.getElementById('pc'+i).className='pcard'+(i===currentPlayer?' active':'');
    document.getElementById('pp'+i).textContent=positions[i]>0?`مربع ${positions[i]}`:'الانتظار';
  }
}
function setMsg(txt,cls=''){
  const m=document.getElementById('msg');
  m.textContent=txt;m.className=cls;
}

// ============================================================
// منطق اللعبة
// ============================================================
const delay = ms => new Promise(r=>setTimeout(r,ms));

document.getElementById('roll-btn').addEventListener('click', async()=>{
  if(busy)return;
  busy=true;
  document.getElementById('roll-btn').disabled=true;

  const roll=Math.ceil(Math.random()*6);

  const dd=document.getElementById('dice-display');
  dd.classList.add('rolling');
  for(let i=0;i<9;i++){drawDiceFace(Math.ceil(Math.random()*6));await delay(50);}
  dd.classList.remove('rolling');
  drawDiceFace(roll);

  setMsg(`${PLAYER_EMOJIS[currentPlayer]} ${PLAYER_NAMES[currentPlayer]} رمى ${roll}`);
  await delay(400);

  const won=await movePlayer(currentPlayer,roll);
  if(won)return;

  currentPlayer=(currentPlayer+1)%numPlayers;
  updateCards();drawTokens();
  setMsg(`${PLAYER_EMOJIS[currentPlayer]} دور ${PLAYER_NAMES[currentPlayer]}`);
  busy=false;
  document.getElementById('roll-btn').disabled=false;
});

async function movePlayer(pi, roll){
  let pos=positions[pi];
  const npos=pos+roll;
  if(npos>100){
    setMsg(`${PLAYER_EMOJIS[pi]} تحتاج ${100-pos} بالضبط للفوز!`);
    busy=false;document.getElementById('roll-btn').disabled=false;
    return false;
  }
  positions[pi]=npos;drawTokens();updateCards();
  await delay(600);
  if(npos===100){
    setMsg(`🏆 ${PLAYER_NAMES[pi]} فاز!`,'win');
    document.getElementById('win-txt').textContent=`${PLAYER_EMOJIS[pi]} ${PLAYER_NAMES[pi]} وصل إلى 100 وفاز!`;
    await delay(400);
    document.getElementById('win-ov').classList.add('show');
    return true;
  }
  const snake=SNAKES.find(s=>s.head===npos);
  if(snake){
    setMsg(`😱 ثعبان! ${npos} ← ${snake.tail}`,'snake');
    await delay(900);
    positions[pi]=snake.tail;drawTokens();updateCards();
  } else {
    const ladder=LADDERS.find(l=>l.from===npos);
    if(ladder){
      setMsg(`🪜 سلم! ${npos} ↑ ${ladder.to}`,'ladder');
      await delay(900);
      positions[pi]=ladder.to;drawTokens();updateCards();
    } else {
      setMsg(`${PLAYER_EMOJIS[pi]} انتقل إلى مربع ${npos}`);
    }
  }
  updateCards();return false;
}

// ============================================================
// إعادة الضبط
// ============================================================
function calcCellSize(){
  const vw=window.innerWidth-195, vh=window.innerHeight-20;
  return Math.floor(Math.min(vw,vh,580)/10);
}

function resetGame(){
  document.getElementById('win-ov').classList.remove('show');
  const p=prompt('عدد اللاعبين؟ (2-4)','2');
  numPlayers=Math.min(4,Math.max(2,parseInt(p)||2));
  positions=new Array(numPlayers).fill(0);
  currentPlayer=0;busy=false;
  buildPlayerCards();updateCards();
  C=calcCellSize();
  drawBoard();drawTokens();drawDiceFace(1);
  setMsg(`${PLAYER_EMOJIS[0]} دور ${PLAYER_NAMES[0]} - اضغط لرمي النرد!`);
  document.getElementById('roll-btn').disabled=false;
}
document.getElementById('reset-btn').addEventListener('click',resetGame);

// بداية التشغيل
(function init(){
  boardCanvas=document.getElementById('board-canvas');
  boardCtx=boardCanvas.getContext('2d');
  tokenCanvas=document.getElementById('token-canvas');
  tokenCtx=tokenCanvas.getContext('2d');
  diceCanvas=document.getElementById('dice-canvas');
  diceCtx=diceCanvas.getContext('2d');

  const p=prompt('عدد اللاعبين؟ (2-4)','2');
  numPlayers=Math.min(4,Math.max(2,parseInt(p)||2));
  positions=new Array(numPlayers).fill(0);
  currentPlayer=0;busy=false;
  C=calcCellSize();
  drawBoard();drawTokens();buildPlayerCards();drawDiceFace(1);
  setMsg(`${PLAYER_EMOJIS[0]} دور ${PLAYER_NAMES[0]} - اضغط لرمي النرد!`);

  window.addEventListener('resize',()=>{
    C=calcCellSize();
    drawBoard();drawTokens();
  });
})();
</script>
